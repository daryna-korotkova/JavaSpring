<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Мій кабінет</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
        color: #fff;
    }
    .container-main {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        margin-top: 50px;
        margin-bottom: 50px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        color: #333;
    }
    .profile-header {
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 20px;
        margin-bottom: 30px;
    }
    .info-card {
        background-color: #f8f9fa;
        border-radius: 15px;
        padding: 20px;
        border: none;
        height: 100%;
    }
    .course-row {
        transition: all 0.2s;
        border-radius: 10px;
        margin-bottom: 10px;
        background: #fff;
        border: 1px solid #eee;
        color: #333;
    }
    .course-row:hover {
        background-color: #fcfaff;
        transform: scale(1.01);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .btn-back {
        background: #764ba2;
        color: white;
        border-radius: 10px;
        padding: 10px 20px;
        text-decoration: none;
        transition: 0.3s;
        display: inline-flex;
        align-items: center;
    }
    .btn-back:hover {
        background: #667eea;
        color: white;
        box-shadow: 0 4px 12px rgba(118, 75, 162, 0.3);
    }
    .status-badge {
        background: #e3fcef;
        color: #00875a;
        font-weight: 600;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="container container-main">
  <header class="profile-header d-flex justify-content-between align-items-center">
    <div>
      <h2 class="fw-bold mb-0 text-dark">Особистий кабінет</h2>
      <p class="text-muted mb-0">Керуйте своїм навчанням та переглядайте придбані курси</p>
    </div>
    <a th:href="@{/courses(email=${client.email})}" class="btn-back">
      <i class="bi bi-arrow-left me-2"></i> Назад до курсів
    </a>
  </header>

  <div class="row g-4 text-dark">
    <div class="col-lg-4">
      <div class="info-card shadow-sm text-center">
        <div class="bg-primary d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
             style="width: 80px; height: 80px; background: linear-gradient(45deg, #667eea, #764ba2) !important;">
          <i class="bi bi-person-fill text-white fs-1"></i>
        </div>
        <h4 class="fw-bold mb-1" th:text="${client.firstName} + ' ' + ${client.lastName}"></h4>
        <span class="badge bg-secondary-subtle text-secondary px-3 py-2 mb-4">Студент Платформи</span>

        <div class="text-start mt-2">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-envelope me-3 text-primary fs-5"></i>
            <div>
              <small class="text-muted d-block small">Електронна пошта</small>
              <span class="fw-semibold" th:text="${client.email}"></span>
            </div>
          </div>
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-calendar-check me-3 text-primary fs-5"></i>
            <div>
              <small class="text-muted d-block small">Дата реєстрації</small>
              <span class="fw-semibold" th:text="${#temporals.format(client.collaborationStartDate, 'dd MMMM yyyy')}"></span>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <i class="bi bi-mortarboard me-3 text-primary fs-5"></i>
            <div>
              <small class="text-muted d-block small">Активних курсів</small>
              <span class="fw-bold text-primary fs-5" th:text="${#lists.size(myOrders)}">0</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="ps-lg-3">
        <h4 class="fw-bold mb-4">Моє навчання</h4>

        <div th:if="${#lists.isEmpty(myOrders)}" class="text-center py-5 bg-light rounded-4 border border-dashed">
          <i class="bi bi-journal-x text-muted" style="font-size: 4rem;"></i>
          <p class="mt-3 text-muted">Ви ще не придбали жодного курсу.</p>
          <a th:href="@{/courses(email=${client.email})}" class="btn btn-primary px-4">Переглянути каталог</a>
        </div>

        <div th:unless="${#lists.isEmpty(myOrders)}">
          <div class="card course-row p-3 shadow-sm border-0 mb-3" th:each="order : ${myOrders}">
            <div class="row align-items-center">
              <div class="col-md-6">
                <h6 class="fw-bold mb-1" th:text="${order.course.courseName}"></h6>
                <span class="badge bg-primary-subtle text-primary border border-primary-subtle"
                      th:text="${order.course.disciplineName}"></span>
              </div>
              <div class="col-md-3 text-md-center">
                <small class="text-muted d-block small">Дата покупки</small>
                <span class="small fw-semibold text-dark"
                      th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></span>
              </div>
              <div class="col-md-3 text-md-end">
                <span class="status-badge">
                  <i class="bi bi-check-circle-fill me-1"></i> Активний
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
