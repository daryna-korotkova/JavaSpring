<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід у систему курсів</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card sx-auto" style="max-width: 400px; margin: auto;">
    <div class="card-body">
        <h3 class="card-title text-center">Реєстрація / Вхід</h3>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Електронна пошта:</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ім'я (для нових користувачів):</label>
                <input type="text" name="firstName" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Прізвище (для нових користувачів):</label>
                <input type="text" name="lastName" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Увійти</button>
        </form>
    </div>
</div>
</body>
</html>
