<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід та Реєстрація</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="container mt-5">
<div class="card mx-auto" style="max-width: 500px;">
    <div class="card-header text-center">
        <button class="btn btn-link" onclick="showForm('login')">Вхід</button>
        <button class="btn btn-link" onclick="showForm('register')">Реєстрація</button>
    </div>
    <div class="card-body">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form id="loginForm" th:action="@{/login}" method="post">
            <h4>Вхід</h4>
            <input type="email" name="email" class="form-control mb-2" placeholder="Пошта" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Пароль" required>
            <button type="submit" class="btn btn-primary w-100">Увійти</button>
        </form>

        <form id="registerForm" th:action="@{/register}" method="post" class="hidden">
            <h4>Реєстрація</h4>
            <input type="email" name="email" class="form-control mb-2" placeholder="Пошта" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Пароль" required>
            <input type="text" name="firstName" class="form-control mb-2" placeholder="Ім'я" required>
            <input type="text" name="lastName" class="form-control mb-2" placeholder="Прізвище" required>
            <button type="submit" class="btn btn-success w-100">Зареєструватися</button>
        </form>
    </div>
</div>

<script>
    function showForm(type) {
        document.getElementById('loginForm').classList.toggle('hidden', type === 'register');
        document.getElementById('registerForm').classList.toggle('hidden', type === 'login');
    }
</script>
</body>
</html>
