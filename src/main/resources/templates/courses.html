<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Наші курси</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
        color: #fff;
    }
    .container-main {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        margin-top: 50px;
        margin-bottom: 50px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        color: #333;
    }
    .logo-link {
        text-decoration: none;
        color: inherit;
        transition: opacity 0.2s;
    }
    .logo-link:hover {
        opacity: 0.8;
        color: #764ba2;
    }
    .card {
        border: none;
        transition: transform 0.3s;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .card:hover {
        transform: translateY(-5px);
    }
    .modal-content {
        border-radius: 20px;
        border: none;
        color: #333;
    }
    .btn-primary {
        background: #764ba2;
        border: none;
    }
    .btn-primary:hover {
        background: #667eea;
    }
    .info-label {
        font-weight: 600;
        color: #764ba2;
    }
    .price-box {
        background-color: #f8f9fa;
        border-radius: 10px;
        padding: 15px;
    }
    /* Стиль для розпарсених даних з Вікіпедії */
    .wiki-section {
        background-color: #eef2ff;
        border-left: 4px solid #667eea;
        padding: 15px;
        border-radius: 8px;
        font-size: 0.9rem;
        line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="container container-main">
  <header class="d-flex justify-content-between align-items-center mb-5 border-bottom pb-3">
    <a th:href="@{/courses(email=${client.email})}" class="logo-link">
      <h2 class="fw-bold m-0"><i class="bi bi-mortarboard-fill me-2"></i>Доступні курси</h2>
    </a>

    <div class="d-flex align-items-center">
      <div class="text-end me-3">
        <span class="d-block fw-semibold text-dark" th:text="${client.firstName} + ' ' + ${client.lastName}"></span>
        <small class="text-muted" th:text="${client.email}"></small>
      </div>

      <div class="btn-group">
        <a th:href="@{/cabinet(email=${client.email})}" class="btn btn-outline-primary">
          <i class="bi bi-person-circle me-1"></i> Мій кабінет
        </a>
        <a href="/" class="btn btn-outline-danger">
          <i class="bi bi-box-arrow-right"></i>
        </a>
      </div>
    </div>
  </header>

  <div class="row g-4">
    <div class="col-md-6 col-lg-4" th:each="course : ${courses}">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold" th:text="${course.courseName}"></h5>
          <p class="badge bg-light text-primary align-self-start" th:text="${course.disciplineName}"></p>
          <p class="text-muted small mb-4">Перегляньте деталі та актуальну вартість за курсом банку.</p>
          <button class="btn btn-primary mt-auto w-100"
                  th:onclick="'showDetails(' + ${course.id} + ')'">
            Детальніше
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="courseModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg"> <div class="modal-content shadow">
    <div class="modal-header border-0">
      <h5 class="modal-title fw-bold text-primary"><i class="bi bi-info-circle-fill me-2"></i>Детальна інформація</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
      <div class="row">
        <div class="col-md-7 border-end">
          <div class="mb-2"><span class="info-label">Курс:</span> <span id="modalCourseName"></span></div>
          <div class="mb-2"><span class="info-label">Сфера:</span> <span id="modalDiscipline"></span></div>
          <div class="mb-3"><span class="info-label">Внутрішній опис:</span> <br> <span id="modalDescription" class="text-muted"></span></div>

          <div class="price-box mt-4">
            <div class="d-flex justify-content-between mb-1">
              <span>Ціна (USD):</span>
              <strong id="priceUsd"></strong>
            </div>
            <div class="d-flex justify-content-between mb-1">
              <span>Курс API:</span>
              <span id="currentRate" class="text-muted"></span>
            </div>
            <div class="d-flex justify-content-between border-top pt-2 mt-2">
              <span class="fw-bold">Разом до сплати:</span>
              <span class="text-success fw-bold fs-5" id="priceUah"></span>
            </div>
          </div>
        </div>

        <div class="col-md-5">
          <h6 class="fw-bold"><i class="bi bi-wikipedia me-1"></i> Технічна довідка</h6>
          <div class="wiki-section" id="modalWikiInfo">
            Завантаження технічних даних із мережі...
          </div>
          <p class="text-end mt-2"><small class="text-muted italic">Джерело: uk.wikipedia.org</small></p>
        </div>
      </div>
    </div>
    <div class="modal-footer border-0">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
      <button type="button" class="btn btn-success px-4" onclick="purchase()">Записатися на курс</button>
    </div>
  </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  const myModal = new bootstrap.Modal(document.getElementById('courseModal'));
  let currentCourseId = null;

  function showDetails(courseId) {
      currentCourseId = courseId;
      // Очищуємо поле вікі перед завантаженням
      document.getElementById('modalWikiInfo').innerText = "Парсинг даних...";

      fetch('/api/courses/' + courseId)
          .then(response => response.json())
          .then(data => {
              const rate = (data.priceUah / data.priceUsd).toFixed(2);

              document.getElementById('modalCourseName').innerText = data.courseName;
              document.getElementById('modalDiscipline').innerText = data.disciplineName;
              document.getElementById('modalDescription').innerText = data.description;

              // Вставляємо розпарсені дані з Wikipedia
              document.getElementById('modalWikiInfo').innerText = data.wikiInfo;

              document.getElementById('priceUsd').innerText = "$" + data.priceUsd.toFixed(2);
              document.getElementById('currentRate').innerText = rate + " грн/$";
              document.getElementById('priceUah').innerText = data.priceUah.toFixed(2) + " грн";

              myModal.show();
          })
          .catch(error => {
              console.error('Error:', error);
              Swal.fire('Помилка', 'Не вдалося завантажити дані курсу', 'error');
          });
  }

  function purchase() {
      const email = /*[[${client.email}]]*/ '';
      if (!currentCourseId) return;

      fetch(`/purchase?email=${email}&courseId=${currentCourseId}`, {
          method: 'POST'
      })
      .then(response => {
          if (response.ok) {
              Swal.fire({
                  title: 'Успішно!',
                  text: 'Курс додано до вашого кабінету.',
                  icon: 'success',
                  confirmButtonColor: '#764ba2'
              }).then(() => {
                  myModal.hide();
                  location.reload();
              });
          } else {
              response.text().then(text => {
                  Swal.fire({
                      title: 'Увага!',
                      text: text,
                      icon: 'info',
                      showCancelButton: true,
                      confirmButtonColor: '#764ba2',
                      cancelButtonColor: '#aaa',
                      confirmButtonText: 'Мій кабінет',
                      cancelButtonText: 'Закрити'
                  }).then((result) => {
                      if (result.isConfirmed) {
                          window.location.href = `/cabinet?email=${email}`;
                      }
                  });
              });
          }
      })
      .catch(error => {
          console.error('Error:', error);
          Swal.fire('Помилка', 'Не вдалося виконати операцію', 'error');
      });
  }
</script>
</body>
</html>
